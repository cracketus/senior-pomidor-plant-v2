services:
  senior-pomidor-edge:
    build:
      context: .
      args:
        INSTALL_HARDWARE_DEPS: "false"
    container_name: senior-pomidor-edge-mock
    environment:
      DEVICE_ID: balcony-edge-mock
      MOCK_SENSORS: "true"
      MQTT_HOST: host.docker.internal
      MQTT_PORT: "1883"
      MQTT_TOPIC_PREFIX: senior-pomidor
      HTTP_ENABLED: "false"
      POLL_INTERVAL_SECONDS: "60"
    volumes:
      - ./data:/app/data
