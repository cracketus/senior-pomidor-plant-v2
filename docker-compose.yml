services:
  senior-pomidor-edge:
    build:
      context: .
      args:
        INSTALL_HARDWARE_DEPS: "true"
    container_name: senior-pomidor-edge
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    devices:
      - /dev/i2c-1:/dev/i2c-1
    volumes:
      - ./data:/app/data
      - /run/udev:/run/udev:ro
      - /sys/bus/w1:/sys/bus/w1:ro
      - /sys/devices:/sys/devices:ro
    privileged: true
